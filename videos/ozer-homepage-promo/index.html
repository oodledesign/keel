<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Ozer — Homepage Promo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #351e28;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-fps="30"
      data-width="1920"
      data-height="1080"
    >
      <div id="scene" class="clip" data-start="0" data-duration="10" data-track-index="1">
        <div class="canvas">
          <div class="ambient ambient-a"></div>
          <div class="ambient ambient-b"></div>
          <div class="logo-glow"></div>

          <div class="mark-wrap">
            <svg
              class="mark"
              viewBox="0 0 64 64"
              width="168"
              height="168"
              aria-hidden="true"
            >
              <g fill="#FF5C34" transform="translate(32 32)">
                <ellipse
                  class="petal petal-0"
                  cx="0"
                  cy="-12"
                  rx="7"
                  ry="12"
                  transform="rotate(0)"
                />
                <ellipse
                  class="petal petal-1"
                  cx="0"
                  cy="-12"
                  rx="7"
                  ry="12"
                  transform="rotate(72)"
                />
                <ellipse
                  class="petal petal-2"
                  cx="0"
                  cy="-12"
                  rx="7"
                  ry="12"
                  transform="rotate(144)"
                />
                <ellipse
                  class="petal petal-3"
                  cx="0"
                  cy="-12"
                  rx="7"
                  ry="12"
                  transform="rotate(216)"
                />
                <ellipse
                  class="petal petal-4"
                  cx="0"
                  cy="-12"
                  rx="7"
                  ry="12"
                  transform="rotate(288)"
                />
                <circle class="core" cx="0" cy="0" r="7" />
              </g>
            </svg>
          </div>

          <div class="lockup">
            <div class="wordmark">Ozer</div>
            <div class="accent-line"></div>
            <div class="tagline">The operating system for creative agencies</div>
            <div class="url-pill"><span>ozer.so</span></div>
          </div>
        </div>
      </div>
    </div>

    <style>
      #scene .canvas {
        width: 1920px;
        height: 1080px;
        background: #351e28;
        position: relative;
        overflow: hidden;
        font-family: "Inter", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      #scene .ambient {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(80px);
        opacity: 0;
      }

      #scene .ambient-a {
        width: 720px;
        height: 720px;
        left: 18%;
        top: 12%;
        background: rgba(255, 92, 52, 0.18);
      }

      #scene .ambient-b {
        width: 640px;
        height: 640px;
        right: 12%;
        bottom: 8%;
        background: rgba(65, 96, 111, 0.22);
      }

      #scene .logo-glow {
        position: absolute;
        width: 420px;
        height: 420px;
        left: 50%;
        top: 38%;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(255, 92, 52, 0.35) 0%,
          rgba(53, 30, 40, 0) 68%
        );
        opacity: 0;
        pointer-events: none;
        z-index: 1;
      }

      #scene .mark-wrap {
        position: relative;
        z-index: 2;
        width: 168px;
        height: 168px;
        margin-bottom: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #scene .petal,
      #scene .core {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
      }

      #scene .lockup {
        position: relative;
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0 80px;
        max-width: 1400px;
      }

      #scene .wordmark {
        font-size: 96px;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #fbf6ec;
        line-height: 1;
        opacity: 0;
      }

      #scene .accent-line {
        width: 0;
        height: 3px;
        margin-top: 28px;
        border-radius: 999px;
        background: #ff5c34;
        opacity: 0;
      }

      #scene .tagline {
        margin-top: 28px;
        font-size: 36px;
        font-weight: 500;
        color: #fbf6ec;
        opacity: 0;
        letter-spacing: -0.01em;
      }

      #scene .url-pill {
        margin-top: 36px;
        padding: 10px 28px;
        border-radius: 999px;
        border: 1px solid rgba(251, 246, 236, 0.18);
        background: rgba(42, 23, 32, 0.72);
        opacity: 0;
      }

      #scene .url-pill span {
        font-size: 20px;
        font-weight: 500;
        color: #b7a4ac;
        letter-spacing: 0.04em;
      }
    </style>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const petals = [
        "#scene .petal-0",
        "#scene .petal-1",
        "#scene .petal-2",
        "#scene .petal-3",
        "#scene .petal-4",
      ];

      tl.fromTo(
        "#scene .ambient-a",
        { opacity: 0, scale: 0.7 },
        { opacity: 1, scale: 1, duration: 1.4, ease: "power2.out" },
        0,
      );
      tl.fromTo(
        "#scene .ambient-b",
        { opacity: 0, scale: 0.7 },
        { opacity: 0.85, scale: 1, duration: 1.6, ease: "power2.out" },
        0.15,
      );

      petals.forEach((petal, i) => {
        tl.fromTo(
          petal,
          { opacity: 0, scale: 0.35 },
          { opacity: 1, scale: 1, duration: 0.7, ease: "back.out(1.6)" },
          0.35 + i * 0.1,
        );
      });

      tl.fromTo(
        "#scene .core",
        { opacity: 0, scale: 0.2 },
        { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(2)" },
        0.95,
      );

      tl.fromTo(
        "#scene .logo-glow",
        { opacity: 0, scale: 0.55 },
        { opacity: 1, scale: 1.15, duration: 0.55, ease: "power2.out" },
        1.15,
      );
      tl.to(
        "#scene .logo-glow",
        { opacity: 0.35, scale: 1.55, duration: 1.4, ease: "power2.out" },
        1.7,
      );

      tl.fromTo(
        "#scene .mark-wrap",
        { y: 28 },
        { y: 0, duration: 0.9, ease: "power3.out" },
        2.35,
      );

      tl.fromTo(
        "#scene .wordmark",
        { opacity: 0, y: 28 },
        { opacity: 1, y: 0, duration: 0.9, ease: "power3.out" },
        2.55,
      );

      tl.fromTo(
        "#scene .accent-line",
        { opacity: 0, width: 0 },
        { opacity: 1, width: 120, duration: 0.7, ease: "power3.out" },
        3.2,
      );

      tl.fromTo(
        "#scene .tagline",
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 0.9, ease: "power3.out" },
        3.7,
      );

      tl.fromTo(
        "#scene .url-pill",
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.75, ease: "power3.out" },
        4.5,
      );

      // Soft hold pulse so the last beats feel alive without exiting
      tl.to(
        "#scene .logo-glow",
        { opacity: 0.55, duration: 1.2, ease: "sine.inOut" },
        6.2,
      );
      tl.to(
        "#scene .logo-glow",
        { opacity: 0.3, duration: 1.4, ease: "sine.inOut" },
        7.4,
      );

      window.__timelines["main"] = tl;
      tl.seek(0);
    </script>
  </body>
</html>
