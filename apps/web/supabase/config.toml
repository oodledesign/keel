# A string used to distinguish different Supabase projects on the same host. Defaults to the working
# directory name when running `supabase init`.
project_id = "keel"

[api]
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API
# endpoints. public and storage are always included. Module schemas are created by migration
# 20220101000000_create_module_schemas_for_api.sql. If PostgREST logs a missing schema, the Docker
# DB volume likely predates those migrations while config.toml already lists them: from repo root
# run `supabase stop`, `docker volume rm supabase_db_keel`, then `pnpm supabase:web:start` (fresh
# init applies migrations before PostgREST). Alternatively `pnpm supabase:web:start` then
# `pnpm supabase:web:reset` once the stack is healthy.
schemas = ["public", "storage", "graphql_public", "feedflow", "rankly", "platform_merge", "signatures"]
# Extra schemas to add to the search_path of every request. public is always included.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL. (54332 to avoid conflict if 54322 is already in use)
port = 54332
# The database major version to use. This has to be the same as your remote database's. Run `SHOW
# server_version;` on the remote database to check.
major_version = 17

[studio]
# Port to use for Supabase Studio.
port = 54323

# Email testing server. Emails sent with the local dev setup are not actually sent - rather, they
# are monitored, and you can view the emails that would have been sent from the web interface.
[inbucket]
# Port to use for the email testing server web interface.
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[auth]
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://localhost:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/auth/callback", "http://localhost:3000/update-password", "http://localhost:3000/onboarding"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 seconds (one
# week).
jwt_expiry = 3600
# Allow/disallow new user signups to your project.
enable_signup = true
enable_manual_linking = true
# Passwords shorter than this value will be rejected as weak. Minimum 6, recommended 8 or more.
minimum_password_length = 12
# Passwords that do not meet the following requirements will be rejected as weak.
# Supported values: letters_digits, lower_upper_letters_digits, lower_upper_letters_digits_symbols
password_requirements = "lower_upper_letters_digits_symbols"

# Enable TOTP MFA
[auth.mfa.totp]
verify_enabled = true
enroll_enabled = true

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses. If disabled, only the new email is required to confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = true

[auth.rate_limit]
email_sent = 30
sign_in_sign_ups = 30
token_verifications = 30
token_refresh = 150

# Use an external OAuth provider. The full list of providers are: `apple`, `azure`, `bitbucket`,
# `discord`, `facebook`, `github`, `gitlab`, `google`, `keycloak`, `linkedin`, `notion`, `twitch`,
# `twitter`, `slack`, `spotify`, `workos`, `zoom`.
[auth.external.apple]
enabled = false
client_id = ""
secret = ""
# Overrides the default auth redirectUrl.
redirect_uri = ""
# Overrides the default auth provider URL. Used to support self-hosted gitlab, single-tenant Azure,
# or any other third-party OIDC providers.
url = ""

[auth.email.template.invite]
subject = "You are invited to Ozer"
content_path = "./supabase/templates/invite-user.html"

[auth.email.template.confirmation]
subject = "Confirm your email"
content_path = "./supabase/templates/confirm-email.html"

[auth.email.template.recovery]
subject = "Reset your password"
content_path = "./supabase/templates/reset-password.html"

[auth.email.template.email_change]
subject = "Confirm your email change"
content_path = "./supabase/templates/change-email-address.html"

[auth.email.template.magic_link]
subject = "Sign in to Ozer"
content_path = "./supabase/templates/magic-link.html"

[analytics]
enabled = true
port = 54337
backend = "postgres"

[db.migrations]
schema_paths = [
  "./schemas/*.sql",
]

[db.seed]
sql_paths = ['seed.sql']
